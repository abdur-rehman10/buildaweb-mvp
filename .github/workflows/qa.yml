name: QA

on:
  pull_request:
    branches: [develop, main]
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

concurrency:
  group: pr-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  api:
    name: QA / API
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 25
    defaults:
      run:
        working-directory: apps/api
    env:
      CI: true
      TZ: UTC
    steps:
      - uses: actions/checkout@v5

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.0
          run_install: false

      - name: Setup Node.js 20 LTS (cache pnpm)
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: apps/api/pnpm-lock.yaml

      - name: Install deps (locked)
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run --if-present lint

      - name: Typecheck
        run: pnpm run --if-present typecheck

      - name: Test
        run: pnpm run --if-present test -- --ci

      - name: Build
        run: pnpm run --if-present build

      - name: Upload API build artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-dist-${{ github.sha }}
          path: apps/api/dist
          if-no-files-found: ignore

  web:
    name: QA / WEB
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 25
    defaults:
      run:
        working-directory: apps/web
    env:
      CI: true
      TZ: UTC
    steps:
      - uses: actions/checkout@v5

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.0
          run_install: false

      - name: Setup Node.js 20 LTS (cache pnpm)
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: apps/web/pnpm-lock.yaml

      - name: Install deps (locked)
        run: pnpm install --frozen-lockfile

      - name: Lint (if configured)
        run: pnpm run --if-present lint

      - name: Typecheck (if configured)
        run: pnpm run --if-present typecheck

      - name: Test (if configured)
        run: pnpm run --if-present test -- --run

      - name: Build
        run: pnpm run --if-present build

      - name: Upload WEB build artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: web-dist-${{ github.sha }}
          path: apps/web/dist
          if-no-files-found: ignore
