name: Deploy Staging to ECS

on:
  push:
    branches:
      - develop
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      ECS_CLUSTER: buildaweb-prod
      ECS_SERVICE_API: buildaweb-api-stg-svc
      ECS_SERVICE_WEB: buildaweb-web-stg-svc
      API_ECR_REPO: buildaweb-api
      WEB_ECR_REPO: buildaweb-web
      STAGING_BASE_URL: https://staging.buildaweb.ai
      IMAGE_TAG: ${{ github.sha }}-${{ github.run_attempt }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push API (linux/amd64)
        uses: docker/build-push-action@v6
        with:
          context: apps/api
          file: apps/api/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ steps.ecr.outputs.registry }}/${{ env.API_ECR_REPO }}:${{ env.IMAGE_TAG }}

      - name: Build & push WEB (linux/amd64)
        uses: docker/build-push-action@v6
        with:
          context: apps/web
          file: apps/web/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ steps.ecr.outputs.registry }}/${{ env.WEB_ECR_REPO }}:${{ env.IMAGE_TAG }}

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Register new API task definition revision (update image)
        id: api_td
        run: |
          set -euo pipefail
          IMAGE="${{ steps.ecr.outputs.registry }}/${{ env.API_ECR_REPO }}:${{ env.IMAGE_TAG }}"

          CURR_TD_ARN="$(aws ecs describe-services \
            --cluster "$ECS_CLUSTER" \
            --services "$ECS_SERVICE_API" \
            --query "services[0].taskDefinition" \
            --output text)"

          aws ecs describe-task-definition \
            --task-definition "$CURR_TD_ARN" \
            --query "taskDefinition" \
            --output json > api-td.json

          jq --arg IMAGE "$IMAGE" '
            del(
              .taskDefinitionArn,.revision,.status,.requiresAttributes,
              .compatibilities,.registeredAt,.registeredBy
            )
            | .containerDefinitions = (
              .containerDefinitions
              | map(if .name == "api" then .image = $IMAGE else . end)
            )
          ' api-td.json > api-td-new.json

          NEW_API_TD_ARN="$(aws ecs register-task-definition \
            --cli-input-json file://api-td-new.json \
            --query "taskDefinition.taskDefinitionArn" \
            --output text)"

          echo "new_api_td_arn=$NEW_API_TD_ARN" >> "$GITHUB_OUTPUT"

      - name: Register new WEB task definition revision (update image)
        id: web_td
        run: |
          set -euo pipefail
          IMAGE="${{ steps.ecr.outputs.registry }}/${{ env.WEB_ECR_REPO }}:${{ env.IMAGE_TAG }}"

          CURR_TD_ARN="$(aws ecs describe-services \
            --cluster "$ECS_CLUSTER" \
            --services "$ECS_SERVICE_WEB" \
            --query "services[0].taskDefinition" \
            --output text)"

          aws ecs describe-task-definition \
            --task-definition "$CURR_TD_ARN" \
            --query "taskDefinition" \
            --output json > web-td.json

          jq --arg IMAGE "$IMAGE" '
            del(
              .taskDefinitionArn,.revision,.status,.requiresAttributes,
              .compatibilities,.registeredAt,.registeredBy
            )
            | .containerDefinitions = (
              .containerDefinitions
              | map(if .name == "web" then .image = $IMAGE else . end)
            )
          ' web-td.json > web-td-new.json

          NEW_WEB_TD_ARN="$(aws ecs register-task-definition \
            --cli-input-json file://web-td-new.json \
            --query "taskDefinition.taskDefinitionArn" \
            --output text)"

          echo "new_web_td_arn=$NEW_WEB_TD_ARN" >> "$GITHUB_OUTPUT"

      - name: Deploy API service (staging)
        run: |
          set -euo pipefail
          aws ecs update-service \
            --cluster "$ECS_CLUSTER" \
            --service "$ECS_SERVICE_API" \
            --task-definition "${{ steps.api_td.outputs.new_api_td_arn }}" \
            --force-new-deployment

      - name: Deploy WEB service (staging)
        run: |
          set -euo pipefail
          aws ecs update-service \
            --cluster "$ECS_CLUSTER" \
            --service "$ECS_SERVICE_WEB" \
            --task-definition "${{ steps.web_td.outputs.new_web_td_arn }}" \
            --force-new-deployment

      - name: Wait for services stable
        run: |
          set -euo pipefail
          aws ecs wait services-stable --cluster "$ECS_CLUSTER" --services "$ECS_SERVICE_API" "$ECS_SERVICE_WEB"

      - name: Smoke tests (staging)
        run: |
          set -euo pipefail
          curl -fsS -D /tmp/web_headers.txt "${STAGING_BASE_URL}/" -o /tmp/web_body.html
          curl -fsS -D /tmp/api_headers.txt "${STAGING_BASE_URL}/api/v1/health" -o /tmp/api_body.json
          echo "Web OK"
          echo "API OK"

      - name: Failure summary (ECS events)
        if: failure()
        run: |
          set -euo pipefail
          echo "=== API service events ==="
          aws ecs describe-services --cluster "$ECS_CLUSTER" --services "$ECS_SERVICE_API" \
            --query "services[0].events[0:10].[createdAt,message]" --output table || true
          echo "=== WEB service events ==="
          aws ecs describe-services --cluster "$ECS_CLUSTER" --services "$ECS_SERVICE_WEB" \
            --query "services[0].events[0:10].[createdAt,message]" --output table || true
