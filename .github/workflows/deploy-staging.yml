name: Deploy Staging

on:
  push:
    branches:
      - develop
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'eu-north-1' }}
  AWS_ROLE_TO_ASSUME: ${{ vars.AWS_ROLE_ARN_STAGING || vars.AWS_ROLE_TO_ASSUME }}
  ECS_CLUSTER: ${{ vars.ECS_CLUSTER || 'buildaweb-prod' }}
  ECS_SERVICE_API: ${{ vars.ECS_SERVICE_API || 'buildaweb-api-stg-svc' }}
  ECS_SERVICE_WEB: ${{ vars.ECS_SERVICE_WEB || 'buildaweb-web-stg-svc' }}
  API_ECR_REPO: ${{ vars.API_ECR_REPO || 'buildaweb-api' }}
  WEB_ECR_REPO: ${{ vars.WEB_ECR_REPO || 'buildaweb-web' }}
  STAGING_BASE_URL: ${{ vars.STAGING_BASE_URL || 'https://staging.buildaweb.ai' }}

jobs:
  deploy:
    environment:
      name: staging
      url: https://staging.buildaweb.ai
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure jq is installed
        run: |
          sudo apt-get update
          sudo apt-get install -y jq
      - name: Assert role ARN secret is present
        run: |
            test -n "${{ secrets.AWS_ROLE_ARN_STAGING }}"
      - name: Show AWS region var
        run: |
            echo "AWS_REGION=${{ vars.AWS_REGION }}"
          
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_STAGING }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Verify AWS identity
        run: aws sts get-caller-identity

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image metadata
        id: image
        run: |
          IMAGE_TAG="${GITHUB_SHA}-${GITHUB_RUN_ATTEMPT}"
          echo "image_tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "api_image=${{ steps.ecr.outputs.registry }}/${API_ECR_REPO}:${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "web_image=${{ steps.ecr.outputs.registry }}/${WEB_ECR_REPO}:${IMAGE_TAG}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: apps/api
          file: apps/api/Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ steps.image.outputs.api_image }}

      - name: Build and push Web image
        uses: docker/build-push-action@v6
        with:
          context: apps/web
          file: apps/web/Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ steps.image.outputs.web_image }}

      - name: Register API task definition revision
        id: api_taskdef
        run: |
          CURRENT_API_TASKDEF_ARN=$(aws ecs describe-services \
            --cluster "$ECS_CLUSTER" \
            --services "$ECS_SERVICE_API" \
            --query 'services[0].taskDefinition' \
            --output text)

          aws ecs describe-task-definition \
            --task-definition "$CURRENT_API_TASKDEF_ARN" \
            --query 'taskDefinition' \
            --output json > api-taskdef-current.json

          jq --arg IMAGE "${{ steps.image.outputs.api_image }}" '
            {
              family,
              taskRoleArn,
              executionRoleArn,
              networkMode,
              containerDefinitions,
              volumes,
              placementConstraints,
              requiresCompatibilities,
              cpu,
              memory,
              runtimePlatform,
              proxyConfiguration,
              inferenceAccelerators,
              ephemeralStorage,
              pidMode,
              ipcMode
            }
            | .containerDefinitions |= map(.image = $IMAGE)
            | with_entries(select(.value != null))
          ' api-taskdef-current.json > api-taskdef-new.json

          NEW_API_TASKDEF_ARN=$(aws ecs register-task-definition \
            --cli-input-json file://api-taskdef-new.json \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)

          echo "taskdef_arn=${NEW_API_TASKDEF_ARN}" >> "$GITHUB_OUTPUT"

      - name: Register Web task definition revision
        id: web_taskdef
        run: |
          CURRENT_WEB_TASKDEF_ARN=$(aws ecs describe-services \
            --cluster "$ECS_CLUSTER" \
            --services "$ECS_SERVICE_WEB" \
            --query 'services[0].taskDefinition' \
            --output text)

          aws ecs describe-task-definition \
            --task-definition "$CURRENT_WEB_TASKDEF_ARN" \
            --query 'taskDefinition' \
            --output json > web-taskdef-current.json

          jq --arg IMAGE "${{ steps.image.outputs.web_image }}" '
            {
              family,
              taskRoleArn,
              executionRoleArn,
              networkMode,
              containerDefinitions,
              volumes,
              placementConstraints,
              requiresCompatibilities,
              cpu,
              memory,
              runtimePlatform,
              proxyConfiguration,
              inferenceAccelerators,
              ephemeralStorage,
              pidMode,
              ipcMode
            }
            | .containerDefinitions |= map(.image = $IMAGE)
            | with_entries(select(.value != null))
          ' web-taskdef-current.json > web-taskdef-new.json

          NEW_WEB_TASKDEF_ARN=$(aws ecs register-task-definition \
            --cli-input-json file://web-taskdef-new.json \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)

          echo "taskdef_arn=${NEW_WEB_TASKDEF_ARN}" >> "$GITHUB_OUTPUT"

      - name: Update ECS services
        run: |
          aws ecs update-service \
            --cluster "$ECS_CLUSTER" \
            --service "$ECS_SERVICE_API" \
            --task-definition "${{ steps.api_taskdef.outputs.taskdef_arn }}"

          aws ecs update-service \
            --cluster "$ECS_CLUSTER" \
            --service "$ECS_SERVICE_WEB" \
            --task-definition "${{ steps.web_taskdef.outputs.taskdef_arn }}"

      - name: Wait for ECS services to stabilize
        run: |
          aws ecs wait services-stable \
            --cluster "$ECS_CLUSTER" \
            --services "$ECS_SERVICE_API" "$ECS_SERVICE_WEB"

      - name: Smoke tests
        run: |
          curl -fsS "${STAGING_BASE_URL}/"
          curl -fsS "${STAGING_BASE_URL}/api/v1/health"

      - name: Failure summary
        if: failure()
        run: |
          echo "Recent ECS events for API service (${ECS_SERVICE_API}):"
          aws ecs describe-services \
            --cluster "$ECS_CLUSTER" \
            --services "$ECS_SERVICE_API" \
            --query 'services[0].events[:20].[createdAt,message]' \
            --output table || true

          echo "Recent ECS events for Web service (${ECS_SERVICE_WEB}):"
          aws ecs describe-services \
            --cluster "$ECS_CLUSTER" \
            --services "$ECS_SERVICE_WEB" \
            --query 'services[0].events[:20].[createdAt,message]' \
            --output table || true

      - name: Assert role secret is present
        run: |
         test -n "${{ secrets.AWS_ROLE_ARN_STAGING }}"

      - name: Who am I in AWS?
        run: aws sts get-caller-identity
