name: Deploy Staging

on:
  push:
    branches:
      - develop
  workflow_dispatch:

concurrency:
  group: deploy-staging-develop
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Deploy Staging / ECS
    environment:
      name: staging
      url: https://staging.buildaweb.ai
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      # Repo Variables (recommended to set these in GitHub → Settings → Secrets and variables → Actions → Variables)
      AWS_REGION: ${{ vars.AWS_REGION || 'eu-north-1' }}
      ECS_CLUSTER: ${{ vars.ECS_CLUSTER || 'buildaweb-prod' }}
      ECS_SERVICE_API: ${{ vars.ECS_SERVICE_API || 'buildaweb-api-stg-svc' }}
      ECS_SERVICE_WEB: ${{ vars.ECS_SERVICE_WEB || 'buildaweb-web-stg-svc' }}
      ECR_REPO_API: ${{ vars.ECR_REPO_API || vars.API_ECR_REPO || 'buildaweb-api' }}
      ECR_REPO_WEB: ${{ vars.ECR_REPO_WEB || vars.WEB_ECR_REPO || 'buildaweb-web' }}

      # Optional repo variables
      ALB_DNS: ${{ vars.ALB_DNS }}
      STAGING_BASE_URL: ${{ vars.STAGING_BASE_URL || 'https://staging.buildaweb.ai' }}

      # Secret (OIDC role)
      AWS_ROLE_ARN_EFFECTIVE: ${{ secrets.AWS_ROLE_ARN_STAGING || secrets.AWS_ROLE_ARN }}

      # Tag images per run
      IMAGE_TAG: ${{ github.sha }}-${{ github.run_attempt }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required staging config
        run: |
          set -euo pipefail

          if [ -z "${AWS_ROLE_ARN_EFFECTIVE:-}" ]; then
            echo "::error::Missing required repository secret: AWS_ROLE_ARN_STAGING (or AWS_ROLE_ARN)"
            exit 1
          fi

          missing=0
          for key in AWS_REGION ECS_CLUSTER ECS_SERVICE_API ECS_SERVICE_WEB ECR_REPO_API ECR_REPO_WEB; do
            if [ -z "${!key:-}" ]; then
              echo "::error::Missing required repository variable: $key"
              missing=1
            fi
          done

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

          echo "Resolved config:"
          echo "AWS_REGION=$AWS_REGION"
          echo "ECS_CLUSTER=$ECS_CLUSTER"
          echo "ECS_SERVICE_API=$ECS_SERVICE_API"
          echo "ECS_SERVICE_WEB=$ECS_SERVICE_WEB"
          echo "ECR_REPO_API=$ECR_REPO_API"
          echo "ECR_REPO_WEB=$ECR_REPO_WEB"
          echo "STAGING_BASE_URL=$STAGING_BASE_URL"
          if [ -n "${ALB_DNS:-}" ]; then
            echo "ALB_DNS=$ALB_DNS"
          fi

      - name: Configure AWS credentials (OIDC)
        id: awscreds
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN_EFFECTIVE }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Verify AWS identity
        run: aws sts get-caller-identity

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Set image URIs
        id: image
        run: |
          set -euo pipefail
          echo "api_image=${{ steps.ecr.outputs.registry }}/${ECR_REPO_API}:${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "web_image=${{ steps.ecr.outputs.registry }}/${ECR_REPO_WEB}:${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "API_IMAGE=${{ steps.ecr.outputs.registry }}/${ECR_REPO_API}:${IMAGE_TAG}"
          echo "WEB_IMAGE=${{ steps.ecr.outputs.registry }}/${ECR_REPO_WEB}:${IMAGE_TAG}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: apps/api
          file: apps/api/Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ steps.image.outputs.api_image }}

      - name: Build and push WEB image
        uses: docker/build-push-action@v6
        with:
          context: apps/web
          file: apps/web/Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ steps.image.outputs.web_image }}

      - name: Deploy API and WEB ECS services
        id: deploy
        run: |
          set -euo pipefail

          deploy_service() {
            local service_name="$1"
            local container_name="$2"
            local image_uri="$3"

            echo "Deploying $service_name (container: $container_name) -> $image_uri"

            local current_td_arn
            current_td_arn="$(aws ecs describe-services \
              --cluster "$ECS_CLUSTER" \
              --services "$service_name" \
              --query 'services[0].taskDefinition' \
              --output text)"

            if [ "$current_td_arn" = "None" ] || [ -z "$current_td_arn" ]; then
              echo "::error::Could not find current task definition for service: $service_name"
              aws ecs describe-services --cluster "$ECS_CLUSTER" --services "$service_name"
              exit 1
            fi

            aws ecs describe-task-definition \
              --task-definition "$current_td_arn" \
              --query 'taskDefinition' \
              --output json > taskdef-current.json

            jq --arg IMAGE "$image_uri" --arg CONTAINER "$container_name" '
              {
                family,
                taskRoleArn,
                executionRoleArn,
                networkMode,
                containerDefinitions,
                volumes,
                placementConstraints,
                requiresCompatibilities,
                cpu,
                memory,
                runtimePlatform,
                proxyConfiguration,
                inferenceAccelerators,
                ephemeralStorage,
                pidMode,
                ipcMode
              }
              | .containerDefinitions = (
                  .containerDefinitions
                  | map(if .name == $CONTAINER then .image = $IMAGE else . end)
                )
              | with_entries(select(.value != null))
            ' taskdef-current.json > taskdef-next.json

            local new_td_arn
            new_td_arn="$(aws ecs register-task-definition \
              --cli-input-json file://taskdef-next.json \
              --query 'taskDefinition.taskDefinitionArn' \
              --output text)"

            aws ecs update-service \
              --cluster "$ECS_CLUSTER" \
              --service "$service_name" \
              --task-definition "$new_td_arn" \
              --force-new-deployment > /dev/null

            if ! aws ecs wait services-stable --cluster "$ECS_CLUSTER" --services "$service_name"; then
              echo "::error::Service $service_name failed to reach stable state"
              aws ecs describe-services \
                --cluster "$ECS_CLUSTER" \
                --services "$service_name" \
                --query 'services[0].events[0:20].[createdAt,message]' \
                --output table || true
              exit 1
            fi

            if [ "$container_name" = "api" ]; then
              echo "api_taskdef=$new_td_arn" >> "$GITHUB_OUTPUT"
            else
              echo "web_taskdef=$new_td_arn" >> "$GITHUB_OUTPUT"
            fi
          }

          deploy_service "$ECS_SERVICE_API" "api" "${{ steps.image.outputs.api_image }}"
          deploy_service "$ECS_SERVICE_WEB" "web" "${{ steps.image.outputs.web_image }}"

      - name: Smoke tests
        run: |
          set -euo pipefail
          BASE_URL="${STAGING_BASE_URL:-}"
          if [ -z "$BASE_URL" ] && [ -n "${ALB_DNS:-}" ]; then
            BASE_URL="https://${ALB_DNS}"
          fi
          echo "Smoke testing: ${BASE_URL%/}"
          curl -fsS "${BASE_URL%/}/" >/dev/null
          curl -fsS "${BASE_URL%/}/api/v1/health" >/dev/null

      - name: Staging deployment summary
        if: always()
        run: |
          set -euo pipefail
          echo "Cluster: $ECS_CLUSTER"
          echo "API service: $ECS_SERVICE_API"
          echo "WEB service: $ECS_SERVICE_WEB"
          echo "API image: ${{ steps.image.outputs.api_image }}"
          echo "WEB image: ${{ steps.image.outputs.web_image }}"
          echo "API task definition: ${{ steps.deploy.outputs.api_taskdef || 'n/a' }}"
          echo "WEB task definition: ${{ steps.deploy.outputs.web_taskdef || 'n/a' }}"
          if [ -n "${ALB_DNS:-}" ]; then
            echo "ALB URL: https://${ALB_DNS}"
          else
            echo "ALB URL not configured (set repo variable ALB_DNS if you want it printed)"
          fi
          echo "Staging base URL: ${STAGING_BASE_URL}"

      - name: Failure summary (AWS creds not available)
        if: failure() && steps.awscreds.outcome != 'success'
        run: |
          echo "AWS credentials were not configured successfully."
          echo "Fix AWS_ROLE_ARN_STAGING (or AWS_ROLE_ARN) value + IAM trust policy for GitHub OIDC."

      - name: Failure summary (ECS events)
        if: failure() && steps.awscreds.outcome == 'success'
        run: |
          echo "Recent ECS events for API service (${ECS_SERVICE_API}):"
          aws ecs describe-services \
            --cluster "$ECS_CLUSTER" \
            --services "$ECS_SERVICE_API" \
            --query 'services[0].events[0:20].[createdAt,message]' \
            --output table || true

          echo "Recent ECS events for WEB service (${ECS_SERVICE_WEB}):"
          aws ecs describe-services \
            --cluster "$ECS_CLUSTER" \
            --services "$ECS_SERVICE_WEB" \
            --query 'services[0].events[0:20].[createdAt,message]' \
            --output table || true

      - name: Validate image URIs
        run: |
          set -euo pipefail
          test -n "${{ steps.image.outputs.api_image }}"
          test -n "${{ steps.image.outputs.web_image }}"      