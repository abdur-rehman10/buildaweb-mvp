name: Deploy Staging

on:
  push:
    branches:
      - develop

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      ECS_CLUSTER: ${{ vars.ECS_CLUSTER }}
      ECR_REPO_API: ${{ vars.ECR_REPO_API }}
      ECR_REPO_WEB: ${{ vars.ECR_REPO_WEB }}
      STAGING_BASE_URL: ${{ vars.STAGING_BASE_URL }}
      IMAGE_TAG: ${{ github.sha }}-${{ github.run_attempt }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push API image (linux/amd64)
        uses: docker/build-push-action@v6
        with:
          context: apps/api
          file: apps/api/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPO_API }}:${{ env.IMAGE_TAG }}

      - name: Build & push WEB image (linux/amd64)
        uses: docker/build-push-action@v6
        with:
          context: apps/web
          file: apps/web/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPO_WEB }}:${{ env.IMAGE_TAG }}

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Register new API task definition revision
        id: api_td
        run: |
          set -euo pipefail

          IMAGE="${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPO_API }}:${{ env.IMAGE_TAG }}"
          CURR_TD_ARN="$(aws ecs describe-services \
            --cluster "$ECS_CLUSTER" \
            --services "buildaweb-api-stg-svc" \
            --query "services[0].taskDefinition" \
            --output text)"

          aws ecs describe-task-definition \
            --task-definition "$CURR_TD_ARN" \
            --query "taskDefinition" \
            --output json > api-td.json

          jq --arg IMAGE "$IMAGE" '
            del(
              .taskDefinitionArn,
              .revision,
              .status,
              .requiresAttributes,
              .compatibilities,
              .registeredAt,
              .registeredBy
            )
            | .containerDefinitions = (
                .containerDefinitions
                | map(if .name == "api" then .image = $IMAGE else . end)
              )
          ' api-td.json > api-td-new.json

          NEW_API_TD_ARN="$(aws ecs register-task-definition \
            --cli-input-json file://api-td-new.json \
            --query "taskDefinition.taskDefinitionArn" \
            --output text)"

          echo "new_api_td_arn=$NEW_API_TD_ARN" >> "$GITHUB_OUTPUT"

      - name: Register new WEB task definition revision
        id: web_td
        run: |
          set -euo pipefail

          IMAGE="${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPO_WEB }}:${{ env.IMAGE_TAG }}"
          CURR_TD_ARN="$(aws ecs describe-services \
            --cluster "$ECS_CLUSTER" \
            --services "buildaweb-web-stg-svc" \
            --query "services[0].taskDefinition" \
            --output text)"

          aws ecs describe-task-definition \
            --task-definition "$CURR_TD_ARN" \
            --query "taskDefinition" \
            --output json > web-td.json

          jq --arg IMAGE "$IMAGE" '
            del(
              .taskDefinitionArn,
              .revision,
              .status,
              .requiresAttributes,
              .compatibilities,
              .registeredAt,
              .registeredBy
            )
            | .containerDefinitions = (
                .containerDefinitions
                | map(if .name == "web" then .image = $IMAGE else . end)
              )
          ' web-td.json > web-td-new.json

          NEW_WEB_TD_ARN="$(aws ecs register-task-definition \
            --cli-input-json file://web-td-new.json \
            --query "taskDefinition.taskDefinitionArn" \
            --output text)"

          echo "new_web_td_arn=$NEW_WEB_TD_ARN" >> "$GITHUB_OUTPUT"

      - name: Update API ECS service
        run: |
          set -euo pipefail
          aws ecs update-service \
            --cluster "$ECS_CLUSTER" \
            --service "buildaweb-api-stg-svc" \
            --task-definition "${{ steps.api_td.outputs.new_api_td_arn }}" \
            --force-new-deployment

      - name: Update WEB ECS service
        run: |
          set -euo pipefail
          aws ecs update-service \
            --cluster "$ECS_CLUSTER" \
            --service "buildaweb-web-stg-svc" \
            --task-definition "${{ steps.web_td.outputs.new_web_td_arn }}" \
            --force-new-deployment

      - name: Wait for ECS services stable
        run: |
          set -euo pipefail
          aws ecs wait services-stable \
            --cluster "$ECS_CLUSTER" \
            --services "buildaweb-api-stg-svc" "buildaweb-web-stg-svc"

      - name: Smoke test WEB
        run: |
          set -euo pipefail
          curl -fsS "${STAGING_BASE_URL}/" >/dev/null

      - name: Smoke test API health
        run: |
          set -euo pipefail
          curl -fsS "${STAGING_BASE_URL}/api/v1/health" >/dev/null

      - name: Print ECS service events on failure
        if: failure()
        run: |
          set -euo pipefail
          echo "=== API service events ==="
          aws ecs describe-services \
            --cluster "$ECS_CLUSTER" \
            --services "buildaweb-api-stg-svc" \
            --query "services[0].events[0:20].[createdAt,message]" \
            --output table || true

          echo "=== WEB service events ==="
          aws ecs describe-services \
            --cluster "$ECS_CLUSTER" \
            --services "buildaweb-web-stg-svc" \
            --query "services[0].events[0:20].[createdAt,message]" \
            --output table || true
