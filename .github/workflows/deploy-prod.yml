name: Deploy Production

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read
  issues: write

jobs:
  deploy-prod:
    name: Deploy to ECS Production
    runs-on: ubuntu-latest
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      ECS_CLUSTER: ${{ vars.ECS_CLUSTER }}
      API_SERVICE: ${{ vars.PROD_API_SERVICE }}
      WEB_SERVICE: ${{ vars.PROD_WEB_SERVICE }}
      API_ECR_REPO: ${{ vars.API_ECR_REPO }}
      WEB_ECR_REPO: ${{ vars.WEB_ECR_REPO }}
      DEPLOY_DOMAIN: ${{ vars.PROD_DOMAIN }}
      IMAGE_TAG: ${{ github.sha }}-${{ github.run_attempt }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push API image (linux/amd64)
        uses: docker/build-push-action@v6
        with:
          context: apps/api
          file: apps/api/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.ecr.outputs.registry }}/${{ env.API_ECR_REPO }}:${{ env.IMAGE_TAG }}

      - name: Build and push Web image (linux/amd64)
        uses: docker/build-push-action@v6
        with:
          context: apps/web
          file: apps/web/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.ecr.outputs.registry }}/${{ env.WEB_ECR_REPO }}:${{ env.IMAGE_TAG }}

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Register API task definition revision
        id: api-td
        run: |
          set -euo pipefail
          API_IMAGE="${{ steps.ecr.outputs.registry }}/${API_ECR_REPO}:${IMAGE_TAG}"

          CURRENT_API_TD_ARN="$(aws ecs describe-services \
            --cluster "$ECS_CLUSTER" \
            --services "$API_SERVICE" \
            --query "services[0].taskDefinition" \
            --output text)"

          aws ecs describe-task-definition \
            --task-definition "$CURRENT_API_TD_ARN" \
            --query "taskDefinition" \
            --output json > api-td.json

          jq --arg IMAGE "$API_IMAGE" '
            del(.taskDefinitionArn,.revision,.status,.requiresAttributes,.compatibilities,.registeredAt,.registeredBy)
            | .containerDefinitions = (.containerDefinitions | map(if .name == "api" then .image = $IMAGE else . end))
          ' api-td.json > api-td-new.json

          NEW_API_TD_ARN="$(aws ecs register-task-definition \
            --cli-input-json file://api-td-new.json \
            --query "taskDefinition.taskDefinitionArn" \
            --output text)"

          echo "new_api_td_arn=$NEW_API_TD_ARN" >> "$GITHUB_OUTPUT"

      - name: Register Web task definition revision
        id: web-td
        run: |
          set -euo pipefail
          WEB_IMAGE="${{ steps.ecr.outputs.registry }}/${WEB_ECR_REPO}:${IMAGE_TAG}"

          CURRENT_WEB_TD_ARN="$(aws ecs describe-services \
            --cluster "$ECS_CLUSTER" \
            --services "$WEB_SERVICE" \
            --query "services[0].taskDefinition" \
            --output text)"

          aws ecs describe-task-definition \
            --task-definition "$CURRENT_WEB_TD_ARN" \
            --query "taskDefinition" \
            --output json > web-td.json

          jq --arg IMAGE "$WEB_IMAGE" '
            del(.taskDefinitionArn,.revision,.status,.requiresAttributes,.compatibilities,.registeredAt,.registeredBy)
            | .containerDefinitions = (.containerDefinitions | map(if .name == "web" then .image = $IMAGE else . end))
          ' web-td.json > web-td-new.json

          NEW_WEB_TD_ARN="$(aws ecs register-task-definition \
            --cli-input-json file://web-td-new.json \
            --query "taskDefinition.taskDefinitionArn" \
            --output text)"

          echo "new_web_td_arn=$NEW_WEB_TD_ARN" >> "$GITHUB_OUTPUT"

      - name: Deploy API service and wait stable
        run: |
          set -euo pipefail
          aws ecs update-service \
            --cluster "$ECS_CLUSTER" \
            --service "$API_SERVICE" \
            --task-definition "${{ steps.api-td.outputs.new_api_td_arn }}" \
            --force-new-deployment
          aws ecs wait services-stable --cluster "$ECS_CLUSTER" --services "$API_SERVICE"

      - name: Deploy Web service and wait stable
        run: |
          set -euo pipefail
          aws ecs update-service \
            --cluster "$ECS_CLUSTER" \
            --service "$WEB_SERVICE" \
            --task-definition "${{ steps.web-td.outputs.new_web_td_arn }}" \
            --force-new-deployment
          aws ecs wait services-stable --cluster "$ECS_CLUSTER" --services "$WEB_SERVICE"

      - name: Run production smoke tests
        id: smoke
        run: |
          set -euo pipefail

          BASE_URL="https://${DEPLOY_DOMAIN}"
          FAIL_COUNT=0
          : > smoke-failures.md

          check_endpoint() {
            local method="$1"
            local path="$2"
            local expected="$3"
            local note="$4"
            local url="${BASE_URL}${path}"
            local body_file
            body_file="$(mktemp)"

            local status
            status="$(curl -sS -X "$method" -o "$body_file" -w "%{http_code}" "$url" || true)"
            local snippet
            snippet="$(head -c 300 "$body_file" | tr '\n' ' ' | sed 's/[[:space:]]\+/ /g')"

            if [[ "$expected" == *"$status"* ]]; then
              echo "PASS ${method} ${path} => ${status} (${note})"
              return 0
            fi

            echo "FAIL ${method} ${path} => ${status}; expected ${expected}"
            {
              echo "- endpoint: \\`${method} ${path}\\`"
              echo "  - expected: ${expected}"
              echo "  - actual: ${status}"
              echo "  - body_snippet: ${snippet:-<empty>}"
            } >> smoke-failures.md
            FAIL_COUNT=$((FAIL_COUNT + 1))
          }

          check_endpoint "GET" "/api/v1/health" "200" "expects JSON health response"
          check_endpoint "GET" "/api/v1/auth/me" "401" "expects unauthorized without token"
          check_endpoint "GET" "/" "200" "expects HTML homepage"
          check_endpoint "GET" "/login" "200" "expects login page"
          check_endpoint "GET" "/signup" "200" "expects signup page"
          check_endpoint "GET" "/dashboard" "200 302" "allows app page or auth redirect"

          if [[ "$FAIL_COUNT" -gt 0 ]]; then
            echo "Smoke tests failed (${FAIL_COUNT} endpoint(s))."
            cat smoke-failures.md
            echo "failed=true" >> "$GITHUB_OUTPUT"
          else
            echo "Smoke tests passed."
            echo "failed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Fail workflow on smoke test failures
        if: steps.smoke.outputs.failed == 'true'
        run: |
          set -euo pipefail
          exit 1

      - name: Create issue for production smoke test failure
        if: failure() && steps.smoke.outputs.failed == 'true'
        uses: actions/github-script@v7
        env:
          RUN_LINK: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        with:
          script: |
            const fs = require('fs');
            const failures = fs.readFileSync('smoke-failures.md', 'utf8');
            const title = `Production smoke test failure (${context.sha.slice(0,7)})`;
            const body = [
              'Production smoke tests failed after deployment.',
              '',
              '**Failing endpoints:**',
              failures,
              '',
              `Workflow run: ${process.env.RUN_LINK}`,
              '',
              `@codex fix production failure: ${title}`
            ].join('\n');

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['ci', 'production', 'smoke-test-failure']
            });
